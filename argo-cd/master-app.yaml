apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: master-app
  namespace: argocd
spec: 
  project: argocd-project
  source:
    repoURL: https://github.com/Jagdeep786-ctrl/AiOps.git
    targetRevision: main
    path: argo-cd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
     prune: true
     selfHeal: true
    syncOptions:
     - CreateNamespace=true
      

