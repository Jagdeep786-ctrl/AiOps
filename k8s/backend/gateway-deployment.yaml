apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  namespace: shopping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      name: gateway-pod
      labels:
        app: gateway 
    spec:
      containers:
      - name: gateway-container
        image: jagdeep144/gatewayshoping-service:latest
        imagePullPolicy: IfNotPresent
        ports: 
          - containerPort: 3001
        env:
          - name: NODE_ENV
            value: "production"
          - name: GATEWAY_PORT
            value: "3001"
          - name: AUTH_SERVICE_URL 
            value: "http://auth-service:3002"
          - name: PRODUCTS_SERVICE_URL
            value: "http://products-service:3003"
          - name: ORDERS_SERVICE_URL
            value: "http://orders:3005"   
          - name: OLD_ORDERS_SERVICE_URL
            value: "http://order-service:3004"  
          - name: USERS_SERVICE_URL
            value: "http://user-service:3006"
        resources:
          requests:
            cpu: "200m"
            memory: 300Mi
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: shopping
spec:
  selector:
    app: gateway 
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
  type: ClusterIP 

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: shopping 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 10
