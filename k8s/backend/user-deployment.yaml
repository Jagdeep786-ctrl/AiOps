apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
  namespace: shopping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      name: user-pod
      labels:
        app: user
    spec:
      containers:
      - name: user-container
        image: jagdeep144/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3006
        env:
          - name: PORT
            value: "3006"
          - name: NODE_ENV
            value: "production"
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name:  boutique-secrets
                key:  USERS_DB_URL
        resources:
          requests:
            memory: "150Mi"
            cpu:  "200m"
          limits:
            memory: "300Mi"
            cpu: "400m"
---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shopping
spec:
  selector:
    app: user
  ports:
  - port: 3006
    targetPort: 3006 
    protocol: TCP 
  type: ClusterIP  

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-hpa
  namespace: shopping 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 20
 

