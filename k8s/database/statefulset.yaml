apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: boutique-postgres
  namespace: shopping 
spec:
  serviceName: boutique-postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_USER
            value: postgres 
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: boutique-secrets
                key: POSTGRES_PASSWORD
          - name: PGDATA
            value: /var/lib/postgresql/data/pgdata

        volumeMounts:
          - name: postgres-data-v2
            mountPath: /var/lib/postgresql/data
          - name: init-scripts
            mountPath: /docker-entrypoint-initdb.d

        readinessProbe:
          exec:
            command:
              - sh
              - -c 
              - pg_isready -U postgres 
          initialDelaySeconds: 10
          periodSeconds: 5       
      volumes: 
        - name: init-scripts
          configMap: 
            name: postgres-init-scripts

  volumeClaimTemplates:
  - metadata:
      name: postgres-data-v2
    spec:
      accessModes: 
        - ReadWriteOnce
      storageClassName: gp3  # gp3 in aws
      resources:
        requests:
          storage: 5Gi
